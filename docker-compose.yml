version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: projeto_point_db
    environment:
      POSTGRES_DB: projeto_point
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - projeto_point_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: projeto_point_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - projeto_point_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projeto_point_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/projeto_point
      SECRET_KEY: dev-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: '["http://localhost:3000", "http://frontend:3000"]'
      ENVIRONMENT: development
      DEBUG: true
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_venv:/app/venv
    depends_on:
      - postgres
    networks:
      - projeto_point_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projeto_point_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    networks:
      - projeto_point_network
    command: npm run dev

volumes:
  postgres_data:
  pgadmin_data:
  backend_venv:
  frontend_next:

networks:
  projeto_point_network:
    driver: bridge
